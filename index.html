<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kasora's Personal Website</title>
  <link rel="icon" type="image/x-icon" href="assets/skeb-sniper.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="profile-card" aria-labelledby="site-title">
      <div class="card-header">
        <div>
          <h1 id="site-title">Welcome to my website!</h1>
        </div>
      </div>

      <div class="software-panel" aria-labelledby="software-title">
        <div class="panel-heading">
          <div>
            <h2 id="software-title">My Software</h2>
          </div>
        </div>

        <div class="software-grid">
          <a class="software-card" href="skeb_sniper/">
            <img src="assets/skeb-sniper.ico" alt="Skeb Sniper icon" class="software-icon">
            <div>
              <h3>Skeb Sniper</h3>
              <p>An automation tool for automatically submitting Skeb commissions when artists open.</p>
            </div>
          </a>

          <a class="software-card accent" href="lucky_stock/">
            <img src="assets/lucky-stock.png" alt="Lucky Stock icon" class="software-icon">
            <div>
              <h3>Lucky Stock</h3>
              <p>A free desktop app that provides daily stock investment amount recommendations.</p>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
